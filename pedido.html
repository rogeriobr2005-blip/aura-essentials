<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Finalizar Pedido</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos p/ a página de checkout*/
        .checkout-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 80px;
            margin-top: 120px;
            align-items: start;
        }

        .checkout-section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .full-width { grid-column: span 2; }

        .order-summary-card {
            background: #fff;
            padding: 40px;
            border: 1px solid #eee;
            position: sticky;
            top: 120px;
        }

        .payment-methods {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .method-option {
            flex: 1;
            padding: 15px;
            border: 1px solid #eee;
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        .method-option.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        @media (max-width: 968px) {
            .checkout-container { grid-template-columns: 1fr; gap: 40px; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="custom-cursor" aria-hidden="true"></div>
<div class="cursor-follower" aria-hidden="true"></div>

<header class="header scrolled">
    <div class="logo-wrapper">
        <a href="index.html" class="logo-link">
            <span class="logo">AURA</span>
            <span class="logo-tagline">Essentials</span>
        </a>
    </div>
</header>

<main class="container">
    <div class="checkout-container">
        
        <section class="checkout-forms">
            <form id="checkout-form">
                <div class="checkout-step">
                    <h2 class="checkout-section-title">Endereço de Entrega</h2>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Nome Completo</label>
                            <input type="text" required placeholder="Ex: Maria Silva">
                        </div>
                        <div class="form-group">
                            <label>CEP</label>
                            <input type="text" id="cep" required placeholder="00000-000">
                        </div>
                        <div class="form-group">
                            <label>Cidade</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group full-width">
                            <label>Logradouro (Rua/Avenida)</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Número</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Complemento</label>
                            <input type="text" placeholder="Apto, Bloco...">
                        </div>
                    </div>
                </div>

                <div class="checkout-step">
                    <h2 class="checkout-section-title">Pagamento</h2>
                    <div class="payment-methods">
                        <div class="method-option selected" onclick="selectPayment(this, 'card')">Cartão de Crédito</div>
                        <div class="method-option" onclick="selectPayment(this, 'pix')">PIX</div>
                    </div>

                    <div id="card-fields" class="form-grid" style="margin-top: 30px;">
                        <div class="form-group full-width">
                            <label>Número do Cartão</label>
                            <input type="text" placeholder="0000 0000 0000 0000">
                        </div>
                        <div class="form-group">
                            <label>Validade</label>
                            <input type="text" placeholder="MM/AA">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" placeholder="123">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-black" style="width: 100%; margin-top: 20px;">Finalizar Pedido Agora</button>
            </form>
        </section>

        <aside class="order-summary-card">
            <h2 class="checkout-section-title" style="font-size: 1.5rem;">Resumo</h2>
            <div id="order-items-list">
                </div>
            
            <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="subtotal">R$ 0,00</span>
                </div>
                <div class="summary-line">
                    <span>Frete</span>
                    <span style="color: #27ae60;">Grátis</span>
                </div>
                <div class="summary-line total" style="font-size: 1.2rem; margin-top: 10px;">
                    <span>Total</span>
                    <span id="grand-total">R$ 0,00</span>
                </div>
            </div>
        </aside>

    </div>
</main>

<div id="notification" aria-live="assertive"></div>

<script>
    //dados do localStorage
    let cart = JSON.parse(localStorage.getItem("aura_luxury_cart")) || [];
    const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

    function renderOrderSummary() {
        const list = document.getElementById("order-items-list");
        const totalEl = document.getElementById("grand-total");
        const subtotalEl = document.getElementById("subtotal");

        if (cart.length === 0) {
            window.location.href = "index.html"; // Se o carrinho estiver vazio, volta
            return;
        }

        list.innerHTML = cart.map(item => `
            <div class="cart-item" style="margin-bottom: 15px;">
                <img src="${item.img}" style="width: 50px; height: 60px; object-fit: cover;">
                <div style="flex:1">
                    <p style="font-size:0.75rem; font-weight:600">${item.name}</p>
                    <small style="color:#888">${item.quantity}x ${formatter.format(item.price)}</small>
                </div>
            </div>
        `).join("");

        const total = cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);
        totalEl.innerText = formatter.format(total);
        subtotalEl.innerText = formatter.format(total);
    }

    function selectPayment(element, type) {
        document.querySelectorAll('.method-option').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
        
        const cardFields = document.getElementById('card-fields');
        cardFields.style.display = (type === 'card') ? 'grid' : 'none';
    }

    // Cursor personalizado
    const cursor = document.querySelector('.custom-cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    // Finalizar formulário
    document.getElementById('checkout-form').onsubmit = (e) => {
        e.preventDefault();
        const toast = document.getElementById("notification");
        toast.innerText = "Pedido realizado com sucesso! Aura Essentials agradece.";
        toast.classList.add("show");
        
        localStorage.removeItem("aura_luxury_cart");
        
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3000);
    };

    renderOrderSummary();
</script>

</body>
</html>
